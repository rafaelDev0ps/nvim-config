# Re maps
set -g prefix ^a # Ctrl + a is the management key (default is Ctrl + b)
set -g terminal-overrides 'xterm*:smcup@:rmcup@'
unbind %
bind | split-window -h # Ctrl + a Shift + \ splits the window horizontally
bind - split-window -v # Ctrl + a - splits the window vertically
bind N break-pane # break the current pane into a window
bind -r H resize-pane -L 5 # resize the current pane left
bind -r J resize-pane -D 5 # resize the current pane left
bind -r K resize-pane -U 5 # resize the current pane left
bind -r L resize-pane -R 5 # resize the current pane left
bind-key < swap-window -t -1 # Ctrl + a > move to the window on the left
bind-key > swap-window -t +1 # Ctrl + a < move to the window on the right

# Set status bar
set -g status-bg black
set -g status-fg white
# Highlight active window
set-window-option -g window-status-current-style bg=blue

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Automatically set window title
setw -g automatic-rename

# Copy mode settings
setw -g mode-keys vi

# vi-style copy bindings
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi r send-keys -X rectangle-toggle

set-option -sg escape-time 10
set-option -g focus-events on
